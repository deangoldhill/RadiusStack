<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @keyframes countUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .kpi-val {
            animation: countUp 0.5s ease forwards;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinning {
            animation: spin 0.8s linear infinite;
        }

        .bubble-card {
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

            .bubble-card:hover {
                transform: translateY(-3px);
                box-shadow: 0 12px 28px rgba(0,0,0,0.12);
            }

        .nas-bar {
            transition: width 0.9s cubic-bezier(.4,0,.2,1);
        }

        .container-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .pulse-green {
            animation: pulse-g 2s ease-out infinite;
        }

        @keyframes pulse-g {
            0% {
                box-shadow: 0 0 0 0 rgba(16,185,129,0.4)
            }

            70% {
                box-shadow: 0 0 0 8px rgba(16,185,129,0)
            }

            100% {
                box-shadow: 0 0 0 0 rgba(16,185,129,0)
            }
        }
    </style>
</head>
<body>
    <main>
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-3xl font-bold text-gray-800">Dashboard</h1>
            <div class="flex items-center gap-3">
                <span id="lastUpdated" class="text-xs text-gray-400"></span>
                <button id="refreshBtn" onclick="loadAll()" class="flex items-center gap-1 text-xs border rounded px-3 py-1.5 text-gray-500 hover:text-blue-600 transition-colors">
                    <svg id="refreshIcon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6" /><path d="M1 20v-6h6" /><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" /></svg>
                    Refresh
                </button>
            </div>
        </div>

        <!-- ── KPI BUBBLES ─────────────────────────────────────────────────────── -->
        <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-8 gap-3 mb-6" id="kpiGrid">
            <!-- filled by JS -->
        </div>

        <!-- ── ROW 1: 7-day trend + Container Health ──────────────────────────── -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">

            <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                <div class="flex items-center gap-2 mb-3">
                    <div class="w-8 h-8 rounded-lg bg-indigo-50 flex items-center justify-center">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></svg>
                    </div>
                    <h3 class="font-bold text-gray-700 text-sm">Authentication Trend — Last 7 Days</h3>
                </div>
                <div class="relative h-48"><canvas id="trendChart"></canvas></div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-8 h-8 rounded-lg bg-gray-100 flex items-center justify-center">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2" /><rect x="2" y="14" width="20" height="8" rx="2" /><line x1="6" y1="6" x2="6.01" y2="6" /><line x1="6" y1="18" x2="6.01" y2="18" /></svg>
                    </div>
                    <h3 class="font-bold text-gray-700 text-sm">Container Health</h3>
                </div>
                <div id="containerList" class="space-y-2">
                    <div class="text-xs text-gray-400">Loading...</div>
                </div>
            </div>
        </div>

        <!-- ── ROW 2: NAS load + Profile dist + Plan dist ─────────────────────── -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2" /><rect x="2" y="14" width="20" height="8" rx="2" /><line x1="6" y1="6" x2="6.01" y2="6" /><line x1="6" y1="18" x2="6.01" y2="18" /></svg>
                    </div>
                    <h3 class="font-bold text-gray-700 text-sm">Active Sessions by NAS</h3>
                </div>
                <div id="nasLoadBars" class="space-y-3"></div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                <div class="flex items-center gap-2 mb-3">
                    <div class="w-8 h-8 rounded-lg bg-purple-50 flex items-center justify-center">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2"><path d="M21.21 15.89A10 10 0 1 1 8 2.83" /><path d="M22 12A10 10 0 0 0 12 2v10z" /></svg>
                    </div>
                    <h3 class="font-bold text-gray-700 text-sm">Users by Profile</h3>
                </div>
                <div class="relative h-44"><canvas id="profileChart"></canvas></div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                <div class="flex items-center gap-2 mb-3">
                    <div class="w-8 h-8 rounded-lg bg-teal-50 flex items-center justify-center">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#14b8a6" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" /><line x1="1" y1="10" x2="23" y2="10" /></svg>
                    </div>
                    <h3 class="font-bold text-gray-700 text-sm">Users by Plan</h3>
                </div>
                <div class="relative h-44"><canvas id="planChart"></canvas></div>
            </div>
        </div>

        <!-- ── ROW 3: Recent Auths + Data summary ────────────────────────────── -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">

            <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-lg bg-green-50 flex items-center justify-center">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></svg>
                        </div>
                        <h3 class="font-bold text-gray-700 text-sm">Recent Auth Events</h3>
                    </div>
                    <a href="authlogs.html" class="text-xs text-blue-600 hover:underline font-medium">View all →</a>
                </div>
                <table class="w-full text-xs">
                    <thead>
                        <tr class="text-gray-500 border-b">
                            <th class="pb-2 text-left font-bold">Result</th>
                            <th class="pb-2 text-left font-bold">Username</th>
                            <th class="pb-2 text-left font-bold">NAS IP</th>
                            <th class="pb-2 text-left font-bold">Time</th>
                        </tr>
                    </thead>
                    <tbody id="recentAuthTable"></tbody>
                </table>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-8 h-8 rounded-lg bg-amber-50 flex items-center justify-center">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" /></svg>
                    </div>
                    <h3 class="font-bold text-gray-700 text-sm">Data Throughput</h3>
                </div>
                <div class="space-y-4">
                    <div class="bg-gray-50 rounded-lg p-4 text-center border">
                        <div class="text-xs text-gray-500 font-bold uppercase mb-1">Today</div>
                        <div class="text-2xl font-black text-blue-600" id="dataToday">—</div>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-4 text-center border">
                        <div class="text-xs text-gray-500 font-bold uppercase mb-1">This Week</div>
                        <div class="text-2xl font-black text-indigo-600" id="dataWeek">—</div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="bg-gray-50 rounded-lg p-3 text-center border">
                            <div class="text-xs text-gray-500 font-bold uppercase mb-1">Auth Today</div>
                            <div class="text-xl font-black text-green-600" id="authTodaySmall">—</div>
                        </div>
                        <div class="bg-gray-50 rounded-lg p-3 text-center border">
                            <div class="text-xs text-gray-500 font-bold uppercase mb-1">Rejects Today</div>
                            <div class="text-xl font-black text-red-500" id="rejectTodaySmall">—</div>
                        </div>
                    </div>
                    <a href="active-sessions.html" class="block w-full text-center bg-green-500 hover:bg-green-600 text-white font-bold py-2.5 rounded-lg text-sm transition-colors">
                        🟢 View Active Sessions
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/layout.js"></script>
    <script>
        var trendChart = null, profileChart = null, planChart = null;
        var PALETTE = ['#6366f1', '#22c55e', '#f59e0b', '#ef4444', '#14b8a6', '#8b5cf6', '#f97316', '#3b82f6'];

        function fmtGB(b) { var g = b / 1073741824; return g >= 1 ? g.toFixed(2) + ' GB' : (b / 1048576).toFixed(0) + ' MB'; }

        function animCount(el, target) {
            var s = parseInt(el.textContent) || 0, r = target - s, t0 = performance.now();
            function step(now) { var p = Math.min((now - t0) / 700, 1), e = 1 - Math.pow(1 - p, 3); el.textContent = Math.round(s + r * e); if (p < 1) requestAnimationFrame(step); }
            requestAnimationFrame(step);
        }

        var KPI_DEFS = [
            { id: 'kpi-users', label: 'Users', icon: '👤', color: 'blue', link: 'users.html' },
            { id: 'kpi-macs', label: 'MAC Devices', icon: '💻', color: 'purple', link: 'mac-auth.html' },
            { id: 'kpi-nas', label: 'NAS Clients', icon: '📡', color: 'indigo', link: 'nas.html' },
            { id: 'kpi-plans', label: 'Plans', icon: '📋', color: 'teal', link: 'plans.html' },
            { id: 'kpi-active', label: 'Active Sessions', icon: '🟢', color: 'green', link: 'active-sessions.html' },
            { id: 'kpi-total', label: 'Total Sessions', icon: '🗄️', color: 'gray', link: 'accounting.html' },
            { id: 'kpi-auth', label: 'Auths Today', icon: '🔑', color: 'amber', link: 'authlogs.html' },
            { id: 'kpi-rejects', label: 'Rejects Today', icon: '🚫', color: 'red', link: 'authlogs.html' },
        ];

        var colorMap = {
            blue: 'border-blue-200 bg-blue-50 text-blue-700',
            purple: 'border-purple-200 bg-purple-50 text-purple-700',
            indigo: 'border-indigo-200 bg-indigo-50 text-indigo-700',
            teal: 'border-teal-200 bg-teal-50 text-teal-700',
            green: 'border-green-200 bg-green-50 text-green-700',
            gray: 'border-gray-200 bg-gray-50 text-gray-700',
            amber: 'border-amber-200 bg-amber-50 text-amber-700',
            red: 'border-red-200 bg-red-50 text-red-700',
        };

        (function buildKpis() {
            var g = document.getElementById('kpiGrid');
            g.innerHTML = KPI_DEFS.map(function (k) {
                var cls = colorMap[k.color] || colorMap.gray;
                return '<a href="' + k.link + '" class="bubble-card ' + cls + ' border rounded-xl p-4 flex flex-col items-center text-center no-underline">' +
                    '<div class="text-2xl mb-1">' + k.icon + '</div>' +
                    '<div class="text-2xl font-black" id="' + k.id + '">—</div>' +
                    '<div class="text-xs font-medium mt-1 opacity-80">' + k.label + '</div>' +
                    '</a>';
            }).join('');
        })();

        async function loadOverview() {
            var btn = document.getElementById('refreshBtn'), icon = document.getElementById('refreshIcon');
            icon.classList.add('spinning'); btn.disabled = true;
            try {
                var res = await apiFetch('/api/reports/dashboard-overview');
                if (!res.ok) return;
                var d = await res.json();
                var c = d.counts;

                animCount(document.getElementById('kpi-users'), c.users);
                animCount(document.getElementById('kpi-macs'), c.macs);
                animCount(document.getElementById('kpi-nas'), c.nas);
                animCount(document.getElementById('kpi-plans'), c.plans);
                animCount(document.getElementById('kpi-active'), c.activeSessions);
                animCount(document.getElementById('kpi-total'), c.totalSessions);
                animCount(document.getElementById('kpi-auth'), c.authToday);
                animCount(document.getElementById('kpi-rejects'), c.rejectToday);
                animCount(document.getElementById('authTodaySmall'), c.authToday);
                animCount(document.getElementById('rejectTodaySmall'), c.rejectToday);

                document.getElementById('dataToday').textContent = fmtGB(d.data.today);
                document.getElementById('dataWeek').textContent = fmtGB(d.data.week);

                // 7-day trend chart
                var days = d.authTrend7d.map(function (r) { return r.day; }),
                    acc = d.authTrend7d.map(function (r) { return Number(r.accepts); }),
                    rej = d.authTrend7d.map(function (r) { return Number(r.rejects); });
                if (trendChart) { trendChart.data.labels = days; trendChart.data.datasets[0].data = acc; trendChart.data.datasets[1].data = rej; trendChart.update(); }
                else trendChart = new Chart(document.getElementById('trendChart'), {
                    type: 'bar', data: {
                        labels: days, datasets: [
                            { label: 'Accepts', data: acc, backgroundColor: 'rgba(34,197,94,0.75)', borderRadius: 4, stack: 's' },
                            { label: 'Rejects', data: rej, backgroundColor: 'rgba(239,68,68,0.7)', borderRadius: 4, stack: 's' }
                        ]
                    }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } }, scales: { x: { stacked: true, ticks: { font: { size: 10 } } }, y: { stacked: true, beginAtZero: true, ticks: { precision: 0, font: { size: 10 } } } } }
                });

                // NAS load bars
                var nl = d.nasLoad, maxN = nl.length ? Math.max.apply(null, nl.map(function (n) { return Number(n.active); })) : 1;
                document.getElementById('nasLoadBars').innerHTML = nl.length ? nl.map(function (n) {
                    var p = Math.round(Number(n.active) / maxN * 100);
                    return '<div><div class="flex justify-between text-xs mb-0.5"><span class="font-mono text-gray-600 truncate max-w-[140px]">' + (n.nasipaddress || '?') + '</span><span class="font-bold text-gray-700">' + n.active + ' active</span></div><div class="h-2 bg-gray-100 rounded-full overflow-hidden"><div class="nas-bar h-2 rounded-full bg-blue-400" style="width:' + p + '%"></div></div></div>';
                }).join('') : '<div class="text-xs text-gray-400 text-center py-4">No active sessions</div>';

                // Profile donut
                var pd = d.profileDist, plb = pd.map(function (r) { return r.groupname; }), pdt = pd.map(function (r) { return Number(r.cnt); });
                if (profileChart) { profileChart.data.labels = plb; profileChart.data.datasets[0].data = pdt; profileChart.update(); }
                else profileChart = new Chart(document.getElementById('profileChart'), { type: 'doughnut', data: { labels: plb, datasets: [{ data: pdt, backgroundColor: PALETTE, borderWidth: 0, hoverOffset: 4 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '60%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9 }, padding: 6 } } } } });

                // Plan donut
                var pld = d.planDist, pllb = pld.map(function (r) { return r.name; }), pldt = pld.map(function (r) { return Number(r.cnt); });
                if (planChart) { planChart.data.labels = pllb; planChart.data.datasets[0].data = pldt; planChart.update(); }
                else planChart = new Chart(document.getElementById('planChart'), { type: 'doughnut', data: { labels: pllb, datasets: [{ data: pldt, backgroundColor: PALETTE, borderWidth: 0, hoverOffset: 4 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '60%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9 }, padding: 6 } } } } });

                // Recent auths
                document.getElementById('recentAuthTable').innerHTML = (d.recentAuths || []).map(function (a) {
                    var ok = a.reply === 'Access-Accept';
                    return '<tr class="border-b border-gray-50 hover:bg-gray-50">' +
                        '<td class="py-2 pr-2"><span class="px-1.5 py-0.5 rounded text-white text-xs ' + (ok ? 'bg-green-500' : 'bg-red-500') + '">' + (ok ? '✓ Accept' : '✗ Reject') + '</span></td>' +
                        '<td class="py-2 pr-2 font-bold text-gray-800 max-w-[100px] truncate">' + a.username + '</td>' +
                        '<td class="py-2 pr-2 font-mono text-gray-500">' + (a.nasipaddress || '-') + '</td>' +
                        '<td class="py-2 text-gray-500">' + new Date(a.authdate).toLocaleTimeString() + '</td>' +
                        '</tr>';
                }).join('');

                document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
            } catch (e) { console.error(e); }
            finally { icon.classList.remove('spinning'); btn.disabled = false; }
        }

        async function loadContainers() {
            try {
                var res = await apiFetch('/api/system/status');
                if (!res.ok) return;
                var containers = await res.json();
                document.getElementById('containerList').innerHTML = containers.length ? containers.map(function (c) {
                    var running = c.state === 'running';
                    var dot = running ? 'bg-green-400 pulse-green' : 'bg-red-400';
                    var badge = running ? 'bg-green-50 text-green-700 border-green-200' : 'bg-red-50 text-red-700 border-red-200';
                    var name = c.name.replace('radius_', '');
                    return '<div class="flex items-center justify-between py-1.5 border-b border-gray-50 last:border-0">' +
                        '<span class="text-xs font-bold text-gray-700 capitalize">' + name + '</span>' +
                        '<span class="container-badge border ' + badge + '"><span class="w-2 h-2 rounded-full ' + dot + ' inline-block"></span>' + (running ? 'Running' : 'Stopped') + '</span>' +
                        '</div>';
                }).join('') : '<div class="text-xs text-gray-400">No containers found</div>';
            } catch (e) { document.getElementById('containerList').innerHTML = '<div class="text-xs text-red-400">Failed to load</div>'; }
        }

        async function loadAll() { await Promise.all([loadOverview(), loadContainers()]); }
        loadAll();
        setInterval(loadAll, 30000);
    </script>
</body>
</html>
