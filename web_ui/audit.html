<!DOCTYPE html>
<html lang="en"><head><link rel="icon" type="image/svg+xml" href="/favicon.svg"><meta charset="UTF-8"><title>Audit Log</title><script src="https://cdn.tailwindcss.com"></script></head><body>
  <main>
    <h1 class="text-3xl font-bold mb-6">Administrator Audit Log</h1>

    <div class="bg-white p-4 rounded shadow mb-6">
      <h2 class="text-lg font-semibold mb-4">Filter & Search</h2>
      <div class="grid grid-cols-4 gap-4">
        <input type="text" id="searchBox" placeholder="Search (username, action, details)" class="border p-2 rounded">
        <select id="resultFilter" class="border p-2 rounded">
          <option value="">All Results</option>
          <option value="success">Success</option>
          <option value="failed">Failed</option>
          <option value="denied">Denied</option>
        </select>
        <input type="date" id="startDate" class="border p-2 rounded">
        <input type="date" id="endDate" class="border p-2 rounded">
      </div>
      <button onclick="loadAudit()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">Apply Filters</button>
    </div>

    <div class="bg-white p-4 rounded shadow overflow-x-auto">
      <table class="w-full text-left text-sm whitespace-nowrap" id="auditTable">
        <thead><tr class="bg-gray-100"><th class="p-2">Timestamp</th><th class="p-2">Admin</th><th class="p-2">Origin</th><th class="p-2">Action</th><th class="p-2">Result</th><th class="p-2">Details</th><th class="p-2">IP</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </main>
  <script src="/js/layout.js"></script>
  <script>
    async function loadAudit() {
      const search = document.getElementById('searchBox').value;
      const result = document.getElementById('resultFilter').value;
      const start = document.getElementById('startDate').value;
      const end = document.getElementById('endDate').value;

      let url = '/api/audit?limit=200';
      if (search) url += `&search=${encodeURIComponent(search)}`;
      if (result) url += `&result=${result}`;
      if (start) url += `&start_date=${start}`;
      if (end) url += `&end_date=${end}`;

      const res = await apiFetch(url);
      if (res.ok) {
        const data = await res.json();
        document.querySelector('#auditTable tbody').innerHTML = data.map(a => {
          const badge = a.result === 'success' ? 'bg-green-500' : a.result === 'failed' ? 'bg-red-500' : 'bg-yellow-500';
          return `<tr>
            <td class="p-2 border-b text-xs">${a.timestamp}</td>
            <td class="p-2 border-b font-bold">${a.admin_username}</td>
            <td class="p-2 border-b"><span class="px-2 py-1 text-xs rounded ${a.origin==='api'?'bg-purple-100 text-purple-800':'bg-blue-100 text-blue-800'}">${a.origin}</span></td>
            <td class="p-2 border-b">${a.action}</td>
            <td class="p-2 border-b"><span class="px-2 py-1 text-xs rounded text-white ${badge}">${a.result}</span></td>
            <td class="p-2 border-b text-xs text-gray-600">${a.details||''}</td>
            <td class="p-2 border-b text-xs">${a.ip_address||''}</td>
          </tr>`;
        }).join('');
      }
    }
    loadAudit();
  </script>
</body></html>
