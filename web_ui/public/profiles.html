<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Profiles</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <main>
    <h1 class="text-3xl font-bold mb-6">Manage Profiles</h1>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <!-- List Profiles -->
      <div class="bg-white p-6 rounded-xl shadow border border-gray-100">
        <h2 class="text-xl font-bold mb-4 border-b pb-2">Existing Profiles</h2>
        <table class="w-full text-left text-sm" id="profilesTable">
          <thead>
            <tr class="bg-gray-50">
              <th class="p-3">Profile Name</th>
              <th class="p-3 text-right">Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- Create/Edit Form -->
      <div class="bg-white p-6 rounded-xl shadow border border-gray-100">
        <h2 class="text-xl font-bold mb-4 border-b pb-2" id="formTitle">Create New Profile</h2>
        
        <form id="profileForm" class="space-y-5">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Profile Name</label>
            <input type="text" id="profileName" class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
          </div>

          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">NAS IP Restriction (Optional)</label>
            <div id="nasCheckboxes" class="w-full border border-gray-300 p-4 rounded-xl bg-gray-50 max-h-48 overflow-y-auto space-y-2 text-sm"></div>
          </div>

          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">VLAN ID (Optional)</label>
            <input type="number" id="vlanId" placeholder="e.g. 10" class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <p class="text-xs text-gray-500 mt-1">Sets Tunnel-Type, Tunnel-Medium-Type, and Tunnel-Private-Group-ID automatically</p>
          </div>

          <div class="border-t pt-5">
            <h3 class="font-bold text-md mb-3">Reply Attributes</h3>
            <div id="replyAttrs" class="space-y-3 mb-4"></div>
            
            <div class="flex gap-2">
              <select id="newAttrKey" class="flex-1 border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></select>
              <input type="text" id="newAttrValue" placeholder="Value" class="flex-1 border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
              <button type="button" onclick="addReplyAttr()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 rounded-lg font-bold">Add</button>
            </div>
          </div>

          <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl w-full font-bold text-lg transition-colors">
            Save Profile
          </button>
        </form>
      </div>
    </div>
  </main>

  <script src="/js/layout.js"></script>
  <script>
    let customAttributes = [];
    const baseAttributes = ["Acct-Interim-Interval", "Session-Timeout", "Idle-Timeout", "Reply-Message", "Mikrotik-Rate-Limit", "Filter-Id"];

    async function init() {
      const setRes = await apiFetch('/api/settings');
      if (setRes.ok) {
        const data = await setRes.json();
        if (data.custom_reply_attributes) {
          customAttributes = data.custom_reply_attributes.split(',').map(a => a.trim()).filter(Boolean);
        }
      }

      const allAttrs = [...baseAttributes, ...customAttributes];
      document.getElementById('newAttrKey').innerHTML = allAttrs.map(a => `<option value="${a}">${a}</option>`).join('');

      const nasRes = await apiFetch('/api/nas');
      if (nasRes.ok) {
        const nasList = await nasRes.json();
        const container = document.getElementById('nasCheckboxes');
        
        container.innerHTML = `
          <label class="flex items-center space-x-3 cursor-pointer font-medium text-green-700">
            <input type="checkbox" id="nasAllowAll" onchange="toggleAllNas(this.checked)" class="h-4 w-4">
            <span>-- No Restriction (Allow from all NAS) --</span>
          </label>`;

        nasList.forEach(n => {
          container.innerHTML += `
            <label class="flex items-center space-x-3 cursor-pointer text-gray-700 ml-6 nas-item">
              <input type="checkbox" name="nas_ips" value="${n.nasname}" class="nas-checkbox h-4 w-4">
              <span>${n.shortname} (${n.nasname})</span>
            </label>`;
        });
      }

      loadProfiles();
    }

    async function loadProfiles() {
      const res = await apiFetch('/api/profiles');
      if (res.ok) {
        const profiles = await res.json();
        document.querySelector('#profilesTable tbody').innerHTML = profiles.map(p => `
          <tr class="border-b hover:bg-gray-50">
            <td onclick="editProfile('${p}')" class="p-3 font-medium text-blue-600 cursor-pointer hover:underline">${p}</td>
            <td class="p-3 text-right">
              <button onclick="editProfile('${p}')" class="text-blue-600 hover:text-blue-700 mr-4">Edit</button>
              <button onclick="deleteProfile('${p}')" class="text-red-600 hover:text-red-700">Delete</button>
            </td>
          </tr>
        `).join('');
      }
    }

    function addReplyAttr() {
      const k = document.getElementById('newAttrKey').value;
      const v = document.getElementById('newAttrValue').value.trim();
      if (!v) return alert('Please enter a value');

      const div = document.createElement('div');
      div.className = "flex gap-2 items-center attr-row";
      div.innerHTML = `
        <input type="text" readonly value="${k}" class="attr-k flex-1 border p-3 rounded-lg bg-gray-100 text-sm">
        <input type="text" readonly value="${v}" class="attr-v flex-1 border p-3 rounded-lg bg-gray-100 text-sm">
        <button type="button" onclick="this.parentElement.remove()" class="bg-red-100 hover:bg-red-200 text-red-700 px-4 py-2 rounded-lg font-bold">Remove</button>
      `;
      document.getElementById('replyAttrs').appendChild(div);
      document.getElementById('newAttrValue').value = '';
    }

    function toggleAllNas(checked) {
      document.querySelectorAll('.nas-checkbox').forEach(cb => cb.checked = !checked);
    }

    async function editProfile(name) {
      document.getElementById('replyAttrs').innerHTML = '';
      document.getElementById('vlanId').value = '';

      document.getElementById('profileName').value = name;
      document.getElementById('profileName').readOnly = true;
      document.getElementById('profileName').classList.add('bg-gray-100');
      document.getElementById('formTitle').textContent = `Editing Profile: ${name}`;

      const res = await apiFetch('/api/profiles/data');
      if (!res.ok) return;

      const data = await res.json();

      const checks = data.checks.filter(c => c.groupname === name);
      const replies = data.replies.filter(r => r.groupname === name);

      // NAS
      const nasChecks = checks.filter(c => c.attribute === 'NAS-IP-Address');
      const nasAllowAll = document.getElementById('nasAllowAll');
      if (nasChecks.length === 0) {
        nasAllowAll.checked = true;
        toggleAllNas(true);
      } else {
        nasAllowAll.checked = false;
        toggleAllNas(false);
        const allowedIps = nasChecks.map(c => c.value);
        document.querySelectorAll('.nas-checkbox').forEach(cb => {
          cb.checked = allowedIps.includes(cb.value);
        });
      }

      // VLAN
      const vlanReply = replies.find(r => r.attribute === 'Tunnel-Private-Group-Id');
      if (vlanReply) document.getElementById('vlanId').value = vlanReply.value;

      // Reply Attributes
      replies.forEach(r => {
        if (!['Tunnel-Type', 'Tunnel-Medium-Type', 'Tunnel-Private-Group-Id'].includes(r.attribute)) {
          addReplyAttr(r.attribute, r.value);   // Note: we pass key and value directly
        }
      });
    }

    async function deleteProfile(name) {
      if (!confirm(`Delete profile "${name}"?`)) return;
      const res = await apiFetch(`/api/profiles/${name}`, { method: 'DELETE' });
      if (res.ok) {
        alert('Profile deleted');
        loadProfiles();
      } else {
        alert('Failed to delete profile');
      }
    }

    // ==================== FIXED SUBMIT ====================
    document.getElementById('profileForm').onsubmit = async (e) => {
      e.preventDefault();

      const profileName = document.getElementById('profileName').value.trim();
      if (!profileName) return alert('Profile name is required');

      const payload = {
        nas_ips: document.getElementById('nasAllowAll').checked 
          ? [] 
          : Array.from(document.querySelectorAll('.nas-checkbox:checked')).map(cb => cb.value),
        vlan_id: document.getElementById('vlanId').value.trim() || '',
        reply_attributes: Array.from(document.querySelectorAll('.attr-row')).map(row => ({
          attribute: row.querySelector('.attr-k').value,   // <-- This must match backend
          value: row.querySelector('.attr-v').value
        }))
      };

      // Always use POST - backend handles both create and update
      const res = await apiFetch(`/api/profiles/${profileName}`, {
        method: 'POST',
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        alert('Profile saved successfully!');
        resetForm();
        loadProfiles();
      } else {
        const err = await res.json().catch(() => ({}));
        alert('Error: ' + (err.error || 'Failed to save profile'));
      }
    };

    function resetForm() {
      document.getElementById('profileForm').reset();
      document.getElementById('replyAttrs').innerHTML = '';
      document.getElementById('profileName').readOnly = false;
      document.getElementById('profileName').classList.remove('bg-gray-100');
      document.getElementById('formTitle').textContent = 'Create New Profile';
      document.getElementById('nasAllowAll').checked = true;
      toggleAllNas(true);
    }

    init();
  </script>
</body>
</html>
