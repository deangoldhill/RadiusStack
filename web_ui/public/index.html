<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <main class="min-h-screen pb-8">
    <h1 class="text-3xl font-bold mb-8">Dashboard</h1>

    <!-- Stats Cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-10">
        <div onclick="window.location.href='nas.html'" class="bg-white p-6 rounded-2xl shadow hover:shadow-xl transition-all cursor-pointer border border-gray-100">
            <div class="text-sm text-gray-500">NAS Clients</div>
            <div id="stat-nas" class="text-5xl font-bold text-blue-600 mt-3">0</div>
        </div>
        <div onclick="window.location.href='users.html'" class="bg-white p-6 rounded-2xl shadow hover:shadow-xl transition-all cursor-pointer border border-gray-100">
            <div class="text-sm text-gray-500">Total Users</div>
            <div id="stat-users" class="text-5xl font-bold text-emerald-600 mt-3">0</div>
        </div>
        <div onclick="window.location.href='profiles.html'" class="bg-white p-6 rounded-2xl shadow hover:shadow-xl transition-all cursor-pointer border border-gray-100">
            <div class="text-sm text-gray-500">Profiles</div>
            <div id="stat-profiles" class="text-5xl font-bold text-violet-600 mt-3">0</div>
        </div>
        <div onclick="window.location.href='plans.html'" class="bg-white p-6 rounded-2xl shadow hover:shadow-xl transition-all cursor-pointer border border-gray-100">
            <div class="text-sm text-gray-500">Billing Plans</div>
            <div id="stat-plans" class="text-5xl font-bold text-amber-600 mt-3">0</div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 h-[calc(100vh-280px)]">   <!-- This makes the boxes fill remaining screen -->
        
        <!-- Active Sessions -->
        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden flex flex-col">
            <div class="px-6 py-5 border-b flex justify-between items-center bg-gray-50">
                <h2 class="text-2xl font-semibold">Active Sessions</h2>
                <span id="active-count" class="text-sm bg-blue-100 text-blue-700 px-4 py-1.5 rounded-full font-medium">0 sessions</span>
            </div>
            <div class="flex-1 min-h-0 overflow-auto">
                <table class="w-full text-sm" id="sessions">
                    <thead class="bg-gray-50 sticky top-0 z-10">
                        <tr>
                            <th class="p-4 text-left font-medium text-gray-600">User</th>
                            <th class="p-4 text-left font-medium text-gray-600">IP Address</th>
                            <th class="p-4 text-left font-medium text-gray-600">Start Time</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y"></tbody>
                </table>
            </div>
        </div>

        <!-- Recent Auth Logs -->
        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden flex flex-col">
            <div class="px-6 py-5 border-b flex justify-between items-center bg-gray-50">
                <h2 class="text-2xl font-semibold">Recent Auth Logs</h2>
                <span class="text-sm bg-gray-100 text-gray-600 px-4 py-1.5 rounded-full font-medium">Last 100 entries</span>
            </div>
            <div class="flex-1 min-h-0 overflow-auto">
                <table class="w-full text-sm" id="logs">
                    <thead class="bg-gray-50 sticky top-0 z-10">
                        <tr>
                            <th class="p-4 text-left font-medium text-gray-600">User</th>
                            <th class="p-4 text-left font-medium text-gray-600">Reply</th>
                            <th class="p-4 text-left font-medium text-gray-600">Date</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </div>
  </main>

  <script src="/js/layout.js"></script>
  <script>
    async function loadDashboard() {
        // Load Stats
        try {
            const [usersRes, nasRes, profilesRes, plansRes] = await Promise.all([
                apiFetch('/api/users'),
                apiFetch('/api/nas'),
                apiFetch('/api/profiles'),
                apiFetch('/api/plans')
            ]);

            if (usersRes.ok) {
                const users = await usersRes.json();
                document.getElementById('stat-users').textContent = users.length;
            }
            if (nasRes.ok) {
                const nas = await nasRes.json();
                document.getElementById('stat-nas').textContent = nas.length;
            }
            if (profilesRes.ok) {
                const profiles = await profilesRes.json();
                document.getElementById('stat-profiles').textContent = profiles.length;
            }
            if (plansRes.ok) {
                const plans = await plansRes.json();
                document.getElementById('stat-plans').textContent = plans.length;
            }
        } catch (e) {
            console.error("Failed to load stats", e);
        }

        // Load Active Sessions (newest 100)
        try {
            const sessRes = await apiFetch('/api/sessions/active?limit=100');
            if (sessRes.ok) {
                const sessions = await sessRes.json();
                const tbody = document.querySelector('#sessions tbody');
                tbody.innerHTML = sessions.map(s => `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="p-4 font-medium">${s.username}</td>
                        <td class="p-4 font-mono text-gray-600">${s.framedipaddress || '—'}</td>
                        <td class="p-4 text-sm text-gray-500">${new Date(s.acctstarttime).toLocaleString()}</td>
                    </tr>
                `).join('');

                document.getElementById('active-count').textContent = `${sessions.length} active`;
            }
        } catch (e) {
            console.error("Failed to load sessions", e);
        }

        // Load Recent Auth Logs (newest 100)
        try {
            const logsRes = await apiFetch('/api/logs/auth?limit=100');
            if (logsRes.ok) {
                const logs = await logsRes.json();
                const tbody = document.querySelector('#logs tbody');
                tbody.innerHTML = logs.map(l => `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="p-4 font-medium">${l.username}</td>
                        <td class="p-4">
                            <span class="${l.reply === 'Access-Accept' ? 'text-green-600 bg-green-100' : 'text-red-600 bg-red-100'} px-3 py-1 rounded text-xs font-medium">
                                ${l.reply}
                            </span>
                        </td>
                        <td class="p-4 text-sm text-gray-500">${new Date(l.authdate).toLocaleString()}</td>
                    </tr>
                `).join('');
            }
        } catch (e) {
            console.error("Failed to load auth logs", e);
        }
    }

    loadDashboard();
  </script>
</body>
</html>
