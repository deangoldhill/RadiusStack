<!DOCTYPE html>
<html lang="en">
<head><link rel="icon" type="image/svg+xml" href="/favicon.svg"><meta charset="UTF-8"><title>Login - Radius</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-200 flex items-center justify-center h-screen">
  <div class="bg-white p-8 rounded shadow-md w-96" id="auth-box">
    <h2 class="text-2xl font-bold mb-6 text-center">Radius Login</h2>
    <div id="msg" class="text-red-500 text-sm mb-4 hidden"></div>

    <form id="login-form">
      <input type="text" id="username" placeholder="Username" class="w-full border p-2 mb-4 rounded" required>
      <input type="password" id="password" placeholder="Password" class="w-full border p-2 mb-4 rounded" required>
      <button class="w-full bg-blue-600 text-white p-2 rounded">Login</button>
    </form>

    <form id="pwd-form" class="hidden">
      <p class="mb-4 text-sm">You must change your password.</p>
      <input type="password" id="new-password" placeholder="New Password" class="w-full border p-2 mb-4 rounded" required>
      <button class="w-full bg-blue-600 text-white p-2 rounded">Change Password</button>
    </form>

    <form id="2fa-setup-form" class="hidden">
      <p class="mb-2 text-sm">Scan this QR code with Google Authenticator.</p>
      <img id="qr-img" class="mx-auto mb-4">
      <input type="text" id="code-setup" placeholder="6-digit code" class="w-full border p-2 mb-4 rounded" required>
      <button class="w-full bg-blue-600 text-white p-2 rounded">Verify & Setup</button>
    </form>

    <form id="2fa-verify-form" class="hidden">
      <p class="mb-4 text-sm">Enter your 2FA code.</p>
      <input type="text" id="code-verify" placeholder="6-digit code" class="w-full border p-2 mb-4 rounded" required>
      <button class="w-full bg-blue-600 text-white p-2 rounded">Verify</button>
    </form>
  </div>

  <script>
    let tempToken = '';
    const show = (id) => { document.querySelectorAll('form').forEach(f => f.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); };
    const showError = (msg) => { const el = document.getElementById('msg'); el.textContent = msg; el.classList.remove('hidden'); };

    document.getElementById('login-form').onsubmit = async (e) => {
      e.preventDefault();
      try {
          const res = await fetch('/auth/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: e.target.username.value, password: e.target.password.value}) });
          if (!res.ok) {
              try {
                  const errData = await res.json();
                  return showError(errData.error || 'Invalid credentials');
              } catch(jsonErr) {
                  return showError('Server error. The API container may be down or crashing.');
              }
          }
          const data = await res.json();
          if(data.error) return showError(data.error);
          handleStatus(data);
      } catch (err) {
          showError('Network error connecting to the server.');
      }
    };

    document.getElementById('pwd-form').onsubmit = async (e) => {
      e.preventDefault();
      const res = await fetch('/auth/change-pwd', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({token: tempToken, newPassword: e.target['new-password'].value}) });
      handleStatus(await res.json());
    };

    document.getElementById('2fa-setup-form').onsubmit = async (e) => {
      e.preventDefault();
      const res = await fetch('/auth/verify-2fa', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({token: tempToken, code: e.target['code-setup'].value}) });
      handleStatus(await res.json());
    };

    document.getElementById('2fa-verify-form').onsubmit = async (e) => {
      e.preventDefault();
      const res = await fetch('/auth/verify-2fa', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({token: tempToken, code: e.target['code-verify'].value}) });
      handleStatus(await res.json());
    };

    function handleStatus(data) {
      if(data.error) return showError(data.error);
      document.getElementById('msg').classList.add('hidden');
      if(data.status === 'success') { localStorage.setItem('apiKey', data.api_key); window.location.href = 'index.html'; }
      if(data.status === 'needs_pwd_change') { tempToken = data.token; show('pwd-form'); }
      if(data.status === 'needs_2fa_setup') { tempToken = data.token; document.getElementById('qr-img').src = data.qrImage; show('2fa-setup-form'); }
      if(data.status === 'needs_2fa_verify') { tempToken = data.token; show('2fa-verify-form'); }
    }
  </script>
</body></html>
