<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="icon" type="image/svg+xml" href="/favicon.svg"><title>Users</title><script src="https://cdn.tailwindcss.com"></script></head><body>
  <main>
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold text-gray-800">User Management</h1>
      <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 transition-colors text-white px-4 py-2 rounded-lg font-bold shadow-sm">+ Add User</button>
    </div>

    <div class="bg-white p-4 rounded-xl shadow-lg border border-gray-100 mb-4">
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Search Users</label>
          <input type="text" id="userSearch" placeholder="Type username, profile or plan..." class="w-full border p-2 rounded-lg bg-gray-50 focus:ring focus:ring-blue-200 outline-none text-sm">
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Assigned Plan</label>
          <select id="planFilter" class="w-full border p-2 rounded-lg bg-gray-50 focus:ring outline-none text-sm">
            <option value="">All Plans</option>
            <option value="__NO_PLAN__">No Plan</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Assigned Profile</label>
          <select id="profileFilter" class="w-full border p-2 rounded-lg bg-gray-50 focus:ring outline-none text-sm">
            <option value="">All Profiles</option>
            <option value="__NO_PROFILE__">No Profile</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">TOTP</label>
          <select id="totpFilter" class="w-full border p-2 rounded-lg bg-gray-50 focus:ring outline-none text-sm">
            <option value="">All</option>
            <option value="enabled">Enabled</option>
            <option value="disabled">Disabled</option>
            <option value="registered">Registered</option>
            <option value="pending">Pending Setup</option>
          </select>
        </div>
      </div>
    </div>

    <div class="bg-white p-4 rounded-xl shadow-lg border border-gray-100 overflow-x-auto">
      <table class="w-full text-left text-sm whitespace-nowrap" id="usersTable">
        <thead><tr class="bg-gray-50 text-gray-600"><th class="p-3 rounded-tl-lg">Username</th><th class="p-3">Password</th><th class="p-3">Assigned Plan</th><th class="p-3">Profile</th><th class="p-3">30-Day Data</th><th class="p-3">30-Day Time</th><th class="p-3">TOTP</th><th class="p-3 text-right rounded-tr-lg">Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <div id="userModal" class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
    <div class="bg-white p-6 rounded-xl shadow-2xl max-w-sm w-full border border-gray-100">
      <h2 class="text-xl font-bold mb-4 text-gray-800" id="modalTitle">Create / Edit User</h2>
      <form id="userForm" class="space-y-4">
        <div><label class="block text-sm font-bold text-gray-700">Username</label>
        <input type="text" id="uname" class="w-full border p-2 rounded-lg bg-gray-50 focus:ring focus:ring-blue-200 outline-none" required></div>

        <div><label class="block text-sm font-bold text-gray-700">Cleartext Password</label>
        <input type="text" id="upass" class="w-full border p-2 rounded-lg bg-gray-50 focus:ring focus:ring-blue-200 outline-none"></div>

        <div><label class="block text-sm font-bold text-gray-700">Billing Plan</label>
        <select id="uplan" class="w-full border p-2 rounded-lg bg-gray-50 focus:ring outline-none"><option value="">-- No Plan (Unlimited) --</option></select></div>

        <div><label class="block text-sm font-bold text-gray-700">Profile</label>
        <select id="uprofile" class="w-full border p-2 rounded-lg bg-gray-50 focus:ring outline-none"><option value="">-- None --</option></select></div>

        <div class="flex justify-end space-x-3 pt-4 border-t">
          <button type="button" onclick="closeModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded-lg font-bold transition-colors">Cancel</button>
          <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold transition-colors shadow-sm">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/layout.js"></script>
  <script>
    let originalUsername = null;

    
    function clearEnrollment(username) {
        if (window.totpEnrollments) delete window.totpEnrollments[username];
        loadData();
    }

    async function toggleTotp(username, enabled) {
      const res = await apiFetch(`/api/users/${encodeURIComponent(username)}`, {
        method: 'PUT', body: JSON.stringify({ totp_enabled: enabled })
      });
      const data = await res.json().catch(()=>({}));
      if (!res.ok) { alert(data.error || 'Failed to update TOTP'); return; }

      window.totpEnrollments = window.totpEnrollments || {};
      if (data.enrollment) {
          window.totpEnrollments[username] = data.enrollment;
      } else {
          delete window.totpEnrollments[username];
      }
      await loadData();
    }
    async function resetTotp(username) {
      if (!confirm(`Reset TOTP for ${username}? They will need to scan a new QR code.`)) return;
      const res = await apiFetch(`/api/users/${encodeURIComponent(username)}/totp/reset`, { method: 'POST' });
      const data = await res.json().catch(()=>({}));
      if (!res.ok) { alert(data.error || 'Failed to reset TOTP'); return; }

      window.totpEnrollments = window.totpEnrollments || {};
      if (data.enrollment) {
          window.totpEnrollments[username] = data.enrollment;
      }
      await loadData();
    }

    let allUsers = [];
    let userSettings = { mask_user_passwords: 'false' };

    function maskPassword(value) {
      if (!value) return '';
      return '•'.repeat(Math.max(8, String(value).length));
    }

    // Escape string safely for javascript inline onClick parameters
    function escapeJS(str) {
      if (!str) return '';
      return String(str).replace(/'/g, "\\'");
    }

    function renderUsers() {
      const search = (document.getElementById('userSearch')?.value || '').trim().toLowerCase();
      const planFilter = document.getElementById('planFilter')?.value || '';
      const profileFilter = document.getElementById('profileFilter')?.value || '';
      const totpFilter = document.getElementById('totpFilter')?.value || '';
      const maskPasswords = userSettings.mask_user_passwords === 'true';

      const filtered = allUsers.filter(u => {
        const planName = u.plan_name || '';
        const profileName = u.profile || '';
        const totpEnabled = Number(u.totp_enabled) === 1;
        const totpRegistered = Number(u.totp_registered) === 1;

        const matchesSearch = !search || [u.username, u.password, planName, profileName].filter(Boolean).some(v => String(v).toLowerCase().includes(search));
        const matchesPlan = !planFilter || (planFilter === '__NO_PLAN__' ? !u.plan_id : String(u.plan_id) === planFilter);
        const matchesProfile = !profileFilter || (profileFilter === '__NO_PROFILE__' ? !profileName : profileName === profileFilter);
        const matchesTotp = !totpFilter
          || (totpFilter === 'enabled' && totpEnabled)
          || (totpFilter === 'disabled' && !totpEnabled)
          || (totpFilter === 'registered' && totpEnabled && totpRegistered)
          || (totpFilter === 'pending' && totpEnabled && !totpRegistered);

        return matchesSearch && matchesPlan && matchesProfile && matchesTotp;
      });

      document.querySelector('#usersTable tbody').innerHTML = filtered.map(u => `
        <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
          <td class="p-3 font-bold text-gray-800">${u.username}</td>
          <td class="p-3 text-gray-500 font-mono text-xs">${maskPasswords ? maskPassword(u.password) : (u.password || '')}</td>
          <td class="p-3"><span class="px-2 py-1 bg-purple-50 text-purple-700 rounded text-xs font-bold border border-purple-200">${u.plan_name || 'No Plan'}</span></td>
          <td class="p-3"><span class="px-2 py-1 bg-blue-50 text-blue-700 rounded text-xs font-bold border border-blue-200">${u.profile || 'None'}</span></td>
          <td class="p-3 font-mono text-xs text-gray-600">${((u.data_30d||0)/1048576).toFixed(2)} MB</td>
          <td class="p-3 font-mono text-xs text-gray-600">${((u.time_30d||0)/3600).toFixed(1)} hrs</td>
          <td class="p-3">
            <div class="flex items-center gap-2">
              <input type="checkbox" ${Number(u.totp_enabled) === 1 ? 'checked' : ''} onchange="toggleTotp('${u.username}', this.checked)" class="h-4 w-4 text-blue-600 rounded">
              <span class="text-sm ${Number(u.totp_registered) === 1 ? 'text-green-600 font-medium' : 'text-amber-600'}">
                ${Number(u.totp_enabled) === 1 ? (Number(u.totp_registered) === 1 ? 'Registered' : 'Pending setup') : 'Disabled'}
              </span>
            </div>
            ${Number(u.totp_enabled) === 1 ? `<div class="text-[10px] text-blue-600 mt-1 cursor-pointer hover:underline uppercase tracking-wider font-bold" onclick="resetTotp('${u.username}')">Reset Key</div>` : ''}
          </td>
          <td class="p-3 text-right space-x-2">
            ${u.plan_id ? `<button onclick="resetPlan(decodeURIComponent('${encodeURIComponent(u.username)}'))" class="bg-yellow-100 text-yellow-700 hover:bg-yellow-200 border border-yellow-200 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors shadow-sm">Reset Usage</button>` : ''}
            <button onclick="editUser(decodeURIComponent('${encodeURIComponent(u.username)}'))" class="bg-gray-100 text-gray-700 hover:bg-gray-200 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors shadow-sm">Edit</button>
            <button onclick="deleteUser(decodeURIComponent('${encodeURIComponent(u.username)}'))" class="bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors shadow-sm">Delete</button>
          </td>
        </tr>
        ${window.totpEnrollments?.[u.username] ? `
          <tr class="bg-blue-50 border-b border-gray-100">
            <td colspan="8" class="p-4">
              <div class="flex justify-between items-start mb-2">
                <h4 class="text-sm font-bold text-blue-800">Pending TOTP Enrollment for ${u.username}</h4>
                <button onclick="clearEnrollment('${u.username}')" class="text-xs text-blue-600 hover:text-blue-800">Dismiss</button>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                  <div class="font-semibold text-gray-700 text-xs mb-1">Registration URL</div>
                  <div class="flex">
                    <input class="w-full border rounded-l px-2 py-1.5 bg-white font-mono text-xs" readonly value="${window.totpEnrollments[u.username].url}" id="url_${u.username}">
                    <button onclick="navigator.clipboard.writeText(document.getElementById('url_${u.username}').value)" class="bg-gray-200 border border-l-0 rounded-r px-2 py-1 hover:bg-gray-300 text-xs">Copy</button>
                  </div>
                </div>
                <div>
                  <div class="font-semibold text-gray-700 text-xs mb-1">One-Time Setup Code</div>
                  <div class="flex">
                    <input class="w-full border rounded-l px-2 py-1.5 bg-white font-mono text-xs" readonly value="${window.totpEnrollments[u.username].code}" id="code_${u.username}">
                    <button onclick="navigator.clipboard.writeText(document.getElementById('code_${u.username}').value)" class="bg-gray-200 border border-l-0 rounded-r px-2 py-1 hover:bg-gray-300 text-xs">Copy</button>
                  </div>
                </div>
                <div>
                  <div class="font-semibold text-gray-700 text-xs mb-1">Expires</div>
                  <input class="w-full border rounded px-2 py-1.5 bg-gray-100 text-xs text-gray-600" readonly value="${new Date(window.totpEnrollments[u.username].expires_at).toLocaleString()}">
                </div>
              </div>
            </td>
          </tr>` : ''}`).join('');
    }

    function populateFilters(plans, profiles) {
      const planFilter = document.getElementById('planFilter');
      const profileFilter = document.getElementById('profileFilter');
      const currentPlan = planFilter.value;
      const currentProfile = profileFilter.value;
      planFilter.innerHTML = '<option value="">All Plans</option><option value="__NO_PLAN__">No Plan</option>' + plans.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
      profileFilter.innerHTML = '<option value="">All Profiles</option><option value="__NO_PROFILE__">No Profile</option>' + profiles.map(x => `<option value="${x}">${x}</option>`).join('');
      planFilter.value = currentPlan;
      profileFilter.value = currentProfile;
    }

    async function loadData() {
      const settingsRes = await apiFetch('/api/settings');
      if (settingsRes.ok) {
        userSettings = await settingsRes.json();
      }

      let plans = [];
      const plRes = await apiFetch('/api/plans');
      if (plRes.ok) {
          plans = await plRes.json();
          document.getElementById('uplan').innerHTML = '<option value="">-- No Plan (Unlimited) --</option>' + plans.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
      }

      let profiles = [];
      const pRes = await apiFetch('/api/profiles');
      if (pRes.ok) {
          profiles = await pRes.json();
          document.getElementById('uprofile').innerHTML = '<option value="">-- None --</option>' + profiles.map(x => `<option value="${x}">${x}</option>`).join('');
      }

      populateFilters(plans, profiles);

      const res = await apiFetch('/api/users');
      if (res.ok) {
        allUsers = await res.json();
        renderUsers();
      }
    }
    async function resetPlan(username) {
        if(!confirm(`Manually reset plan usage limits for ${username}?`)) return;
        const res = await apiFetch(`/api/users/${username}/reset-plan`, { method: 'POST' });
        if(res.ok) { alert('Limits reset successfully'); loadData(); }
    }

    function openModal() {
      originalUsername = null;
      document.getElementById('userModal').classList.remove('hidden');
      document.getElementById('userForm').reset();
      document.getElementById('uname').readOnly = false;
      document.getElementById('uname').classList.remove('bg-gray-100');
    }

    function closeModal() { document.getElementById('userModal').classList.add('hidden'); }

    function editUser(username) {
      const u = allUsers.find(x => x.username === username);
      if (!u) return;

      originalUsername = username;
      document.getElementById('userModal').classList.remove('hidden');
      document.getElementById('uname').value = u.username || '';
      document.getElementById('uname').readOnly = true;
      document.getElementById('uname').classList.add('bg-gray-100');
      document.getElementById('upass').value = u.password || '';
      document.getElementById('uprofile').value = u.profile || '';
      document.getElementById('uplan').value = u.plan_id || '';
    }

    async function deleteUser(username) {
      if(!confirm(`Delete user ${username}?`)) return;
      const res = await apiFetch(`/api/users/${username}`, { method: 'DELETE' });
      if(res.ok) loadData();
    }

    document.getElementById('userForm').onsubmit = async (e) => {
      e.preventDefault();
      const u = document.getElementById('uname').value;
      const p = document.getElementById('upass').value;
      const prof = document.getElementById('uprofile').value;
      const plan = document.getElementById('uplan').value;

      const payload = { username: u, password: p, profile: prof, plan_id: plan };

      if (originalUsername) {
        const res = await apiFetch(`/api/users/${originalUsername}`, { method: 'PUT', body: JSON.stringify(payload) });
        if(res.ok) { closeModal(); loadData(); } else { const err = await res.json(); alert('Error: ' + err.error); }
      } else {
        const res = await apiFetch('/api/users', { method: 'POST', body: JSON.stringify(payload) });
        if(res.ok) { closeModal(); loadData(); } else { const err = await res.json(); alert('Error: ' + err.error); }
      }
    };

    ['userSearch','planFilter','profileFilter','totpFilter'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener(id === 'userSearch' ? 'input' : 'change', renderUsers);
    });

    loadData();
  </script>
</body></html>
