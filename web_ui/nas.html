<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="icon" type="image/svg+xml" href="/favicon.svg"><title>NAS Clients</title><script src="https://cdn.tailwindcss.com"></script></head><body>
  <main>
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold text-gray-800">NAS Clients</h1>
      <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 transition-colors text-white px-4 py-2 rounded-lg font-bold shadow-sm">+ Add NAS</button>
    </div>

    <div class="bg-white p-4 rounded-xl shadow-lg border border-gray-100 overflow-x-auto">
      <table class="w-full text-left text-sm whitespace-nowrap" id="nasTable">
        <thead><tr class="bg-gray-50 text-gray-600"><th class="p-3 rounded-tl-lg">IP Address</th><th class="p-3">Shortname</th><th class="p-3">Secret</th><th class="p-3">Description</th><th class="p-3 text-right rounded-tr-lg">Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <div id="nasModal" class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
    <div class="bg-white p-6 rounded-xl shadow-2xl max-w-sm w-full border border-gray-100">
      <h2 class="text-xl font-bold mb-4 text-gray-800" id="modalTitle">Add NAS Client</h2>
      <form id="nasForm" class="space-y-4">
        <input type="hidden" id="nasId">

        <div><label class="block text-sm font-bold text-gray-700">IP Address (nasname)</label>
        <input type="text" id="nIp" class="w-full border p-2 rounded-lg bg-gray-50 focus:ring focus:ring-blue-200 outline-none" required></div>

        <div><label class="block text-sm font-bold text-gray-700">Shortname</label>
        <input type="text" id="nShort" class="w-full border p-2 rounded-lg bg-gray-50 focus:ring focus:ring-blue-200 outline-none" required></div>

        <div><label class="block text-sm font-bold text-gray-700">Shared Secret</label>
        <input type="text" id="nSec" class="w-full border p-2 rounded-lg bg-gray-50 focus:ring focus:ring-blue-200 outline-none" required></div>

        <div><label class="block text-sm font-bold text-gray-700">Description</label>
        <input type="text" id="nDesc" class="w-full border p-2 rounded-lg bg-gray-50 focus:ring focus:ring-blue-200 outline-none"></div>

        <div class="flex justify-end space-x-3 pt-4 border-t">
          <button type="button" onclick="closeModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded-lg font-bold transition-colors">Cancel</button>
          <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold transition-colors shadow-sm">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/layout.js"></script>
  <script>
    let nasList = [];

    async function loadData() {
      const res = await apiFetch('/api/nas');
      if (res.ok) {
        nasList = await res.json();
        document.querySelector('#nasTable tbody').innerHTML = nasList.map(n => `
        <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
          <td class="p-3 font-bold text-gray-800">${n.nasname}</td>
          <td class="p-3 text-gray-600">${n.shortname}</td>
          <td class="p-3 font-mono text-gray-500 text-xs">${n.secret}</td>
          <td class="p-3 text-gray-500 text-xs">${n.description || ''}</td>
          <td class="p-3 text-right space-x-2">
            <button onclick="openModal(${n.id})" class="bg-gray-100 text-gray-700 hover:bg-gray-200 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors shadow-sm">Edit</button>
            <button onclick="deleteNas(${n.id})" class="bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors shadow-sm">Delete</button>
          </td>
        </tr>`).join('');
      }
    }

    window.openModal = function(id = null) {
      document.getElementById('nasModal').classList.remove('hidden');
      document.getElementById('nasForm').reset();

      if(id) {
        const n = nasList.find(x => x.id === id);
        document.getElementById('modalTitle').textContent = 'Edit NAS Client';
        document.getElementById('nasId').value = n.id;
        document.getElementById('nIp').value = n.nasname;
        document.getElementById('nShort').value = n.shortname;
        document.getElementById('nSec').value = n.secret;
        document.getElementById('nDesc').value = n.description;
      } else {
        document.getElementById('modalTitle').textContent = 'Add NAS Client';
        document.getElementById('nasId').value = '';
      }
    }

    window.closeModal = function() { document.getElementById('nasModal').classList.add('hidden'); }

    window.deleteNas = async function(id) {
      if(!confirm('Delete this NAS Client?')) return;
      const res = await apiFetch(`/api/nas/${id}`, { method: 'DELETE' });
      if(res.ok) {
          alert('Deleted successfully. Note: Radius server must be restarted from the Settings page to take effect.');
          loadData();
      }
    }

    document.getElementById('nasForm').onsubmit = async (e) => {
      e.preventDefault();
      const id = document.getElementById('nasId').value;
      const payload = {
          nasname: document.getElementById('nIp').value,
          shortname: document.getElementById('nShort').value,
          secret: document.getElementById('nSec').value,
          description: document.getElementById('nDesc').value
      };

      const method = id ? 'PUT' : 'POST';
      const url = id ? `/api/nas/${id}` : '/api/nas';

      const res = await apiFetch(url, { method, body: JSON.stringify(payload) });
      if(res.ok) {
          closeModal();
          alert('Saved successfully. Note: Radius server must be restarted from the Settings page to take effect.');
          loadData();
      } else {
          const err = await res.json(); alert('Error: ' + err.error);
      }
    };

    loadData();
  </script>
</body></html>
