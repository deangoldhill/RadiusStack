<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Profiles</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <main>
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">RADIUS Profiles</h1>
            <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 transition-colors text-white px-4 py-2 rounded-lg font-bold shadow-sm">+ Create Profile</button>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-lg border border-gray-100 overflow-x-auto">
            <table class="w-full text-left text-sm whitespace-nowrap" id="profilesTable">
                <thead>
                    <tr class="bg-gray-50 text-gray-600">
                        <th onclick="sortTable('profileName')" class="cursor-pointer hover:bg-gray-100 p-3 rounded-tl-lg">Profile Name</th>
                        <th onclick="sortTable('vlan')" class="cursor-pointer hover:bg-gray-100 p-3">VLAN ID</th>
                        <th onclick="sortTable('nas')" class="cursor-pointer hover:bg-gray-100 p-3">NAS Restriction</th>
                        <th onclick="sortTable('replies')" class="cursor-pointer hover:bg-gray-100 p-3">Reply Attributes</th>
                        <th onclick="sortTable('users')" class="cursor-pointer hover:bg-gray-100 p-3">Users</th>
                        <th class="p-3 text-right rounded-tr-lg">Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>

    <!-- ===================== PROFILE DETAIL PANEL ===================== -->
    <div id="profileDetailOverlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-40 backdrop-blur-sm" onclick="closeDetailPanel()"></div>
    <div id="profileDetailPanel" class="fixed top-0 right-0 h-full w-full max-w-2xl bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col overflow-hidden">

        <!-- Panel Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 bg-gray-50 flex-shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold text-lg" id="pdAvatar">P</div>
                <div>
                    <h2 class="text-lg font-bold text-gray-800" id="pdProfileName">—</h2>
                    <div class="flex items-center gap-2 mt-0.5" id="pdSubtitle">
                        <span class="text-xs text-gray-400">Loading...</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="refreshDetailPanel()" title="Refresh" class="p-2 rounded-lg hover:bg-gray-200 text-gray-500 transition-colors">
                    <svg id="pdRefreshIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6" /><path d="M3 12a9 9 0 0 1 15-6.7L21 8" /><path d="M3 22v-6h6" /><path d="M21 12a9 9 0 0 1-15 6.7L3 16" /></svg>
                </button>
                <button onclick="closeDetailPanel()" class="p-2 rounded-lg hover:bg-gray-200 text-gray-500 transition-colors">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12" /></svg>
                </button>
            </div>
        </div>

        <!-- Panel Tabs -->
        <div class="flex border-b border-gray-100 bg-white flex-shrink-0 px-6">
            <button onclick="switchTab('overview')" id="tab-overview" class="pd-tab active px-4 py-3 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 -mb-px">Overview</button>
            <button onclick="switchTab('users')" id="tab-users" class="pd-tab px-4 py-3 text-sm font-semibold text-gray-500 hover:text-gray-700 border-b-2 border-transparent -mb-px">Users</button>
            <button onclick="switchTab('sessions')" id="tab-sessions" class="pd-tab px-4 py-3 text-sm font-semibold text-gray-500 hover:text-gray-700 border-b-2 border-transparent -mb-px">Active Sessions</button>
            <button onclick="switchTab('config')" id="tab-config" class="pd-tab px-4 py-3 text-sm font-semibold text-gray-500 hover:text-gray-700 border-b-2 border-transparent -mb-px">Configuration</button>
        </div>

        <!-- Panel Body -->
        <div class="flex-1 overflow-y-auto p-6" id="pdBody">
            <div class="flex items-center justify-center h-32 text-gray-400 text-sm">Loading profile data...</div>
        </div>

        <!-- Panel Footer -->
        <div class="flex items-center gap-2 px-6 py-4 border-t border-gray-100 bg-gray-50 flex-shrink-0">
            <button id="pdEditBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors">Edit Profile</button>
            <button id="pdDeleteBtn" class="ml-auto bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 px-4 py-2 rounded-lg text-sm font-bold transition-colors">Delete Profile</button>
        </div>
    </div>

    <!-- ===================== CREATE / EDIT MODAL ===================== -->
    <div id="profileModal" class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-2xl border border-gray-100 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800" id="modalTitle">Create Profile</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
            </div>

            <form id="profileForm" class="space-y-5">
                <input type="hidden" id="editingName">

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Profile Name</label>
                    <input type="text" id="profileName" class="w-full border p-2 rounded-lg bg-gray-50 focus:ring focus:ring-blue-200 outline-none" required>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">NAS IP Restriction <span class="font-normal text-gray-400">(Optional)</span></label>
                    <label class="flex items-center gap-2 mb-3 cursor-pointer text-sm text-gray-700">
                        <input type="checkbox" id="nasAllowAll" onchange="toggleNasRestriction()" class="h-4 w-4 rounded">
                        <span>No Restriction — allow from all NAS</span>
                    </label>
                    <div id="nasIpInputs" class="hidden pl-4 border-l-2 border-gray-200 space-y-2">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-xs text-gray-500">Allowed NAS IP Addresses (supports CIDR)</span>
                            <button type="button" onclick="addNasIpField()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded text-xs font-bold">+ Add IP</button>
                        </div>
                        <div id="nasIpList" class="space-y-2"></div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">VLAN ID <span class="font-normal text-gray-400">(Optional)</span></label>
                    <input type="number" id="vlanId" placeholder="e.g. 10" class="w-full border p-2 rounded-lg bg-gray-50 focus:ring focus:ring-blue-200 outline-none">
                    <p class="text-xs text-gray-400 mt-1">Sets Tunnel-Type, Tunnel-Medium-Type, and Tunnel-Private-Group-ID automatically</p>
                </div>

                <div class="border-t pt-4">
                    <h3 class="text-sm font-bold text-gray-700 mb-3">Reply Attributes</h3>
                    <div id="replyAttrs" class="space-y-2 mb-3"></div>
                    <div class="flex gap-2">
                        <select id="newAttrKey" class="flex-1 border p-2 rounded-lg bg-gray-50 focus:ring focus:ring-blue-200 outline-none text-sm"></select>
                        <input type="text" id="newAttrValue" placeholder="Value" class="flex-1 border p-2 rounded-lg bg-gray-50 focus:ring focus:ring-blue-200 outline-none text-sm">
                        <button type="button" onclick="addReplyAttr()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 rounded-lg font-bold text-sm">Add</button>
                    </div>
                </div>

                <div class="flex justify-end space-x-3 pt-4 border-t">
                    <button type="button" onclick="closeModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded-lg font-bold transition-colors">Cancel</button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold transition-colors shadow-sm">Save Profile</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/layout.js"></script>
    <script>

        let currentSort = null;
        let currentOrder = 'asc';

        function sortTable(field) {
            if (currentSort === field) currentOrder = currentOrder === 'asc' ? 'desc' : 'asc';
            else { currentSort = field; currentOrder = 'asc'; }
            renderTable();
        }

        function getSortValue(pName, field) {
            const checks = allProfileData.checks.filter(c => c.groupname === pName);
            const replies = allProfileData.replies.filter(r => r.groupname === pName);
            const vlanAttr = replies.find(r => r.attribute === 'Tunnel-Private-Group-Id');
            const nasAttr = checks.find(c => c.attribute === 'NAS-IP-Address');
            const userCount = allUsers.filter(u => u.groupname === pName).length;

            switch(field) { case 'profileName': return pName || ''; case 'vlan': return vlanAttr ? vlanAttr.value : ''; case 'nas': return nasAttr ? nasAttr.value : ''; case 'replies': return replies.length; case 'users': return userCount; default: return ''; }
        }

        let customAttributes = [];
        const baseAttributes = ["Acct-Interim-Interval", "Session-Timeout", "Idle-Timeout", "Reply-Message", "Mikrotik-Rate-Limit", "Filter-Id"];
        let allProfileData = { checks: [], replies: [] };
        let allUsers = [];
        let currentDetailProfile = null;
        let currentDetailData = null;
        let currentDetailTab = 'overview';

        // ─── HELPERS ─────────────────────────────────────────────────────────────

        function fmtBytes(b) {
            if (!b || b === 0) return '0 B';
            const gb = b / 1073741824, mb = b / 1048576, kb = b / 1024;
            if (gb >= 1) return gb.toFixed(2) + ' GB';
            if (mb >= 1) return mb.toFixed(1) + ' MB';
            if (kb >= 1) return kb.toFixed(0) + ' KB';
            return b + ' B';
        }

        function fmtDuration(sec) {
            if (!sec || sec === 0) return '0s';
            const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
            if (h > 0) return `${h}h ${m}m`;
            if (m > 0) return `${m}m ${s}s`;
            return `${s}s`;
        }

        function fmtDate(d) {
            if (!d) return '—';
            return new Date(d).toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ─── INIT ─────────────────────────────────────────────────────────────────

        async function init() {
            const setRes = await apiFetch('/api/settings');
            if (setRes.ok) {
                const data = await setRes.json();
                if (data.custom_reply_attributes)
                    customAttributes = data.custom_reply_attributes.split(',').map(a => a.trim()).filter(Boolean);
            }
            const allAttrs = [...baseAttributes, ...customAttributes];
            document.getElementById('newAttrKey').innerHTML = allAttrs.map(a => `<option value="${a}">${a}</option>`).join('');

            const [profileRes, userRes] = await Promise.all([
                apiFetch('/api/profiles/data'),
                apiFetch('/api/users')
            ]);
            if (profileRes.ok) allProfileData = await profileRes.json();
            if (userRes.ok) allUsers = await userRes.json();
            renderTable();
        }

        async function loadProfiles() {
            const [profileRes, userRes] = await Promise.all([
                apiFetch('/api/profiles/data'),
                apiFetch('/api/users')
            ]);
            if (profileRes.ok) allProfileData = await profileRes.json();
            if (userRes.ok) allUsers = await userRes.json();
            renderTable();
        }

        function renderTable() {
            const { checks, replies } = allProfileData;
            const profileSet = new Set();
            [...checks, ...replies].forEach(item => { if (item.groupname) profileSet.add(item.groupname); });
            const profiles = Array.from(profileSet).sort();

            
            if (currentSort) { profiles.sort((a,b) => { let vA = getSortValue(a, currentSort); let vB = getSortValue(b, currentSort); let c = (typeof vA==='number' && typeof vB==='number') ? vA-vB : String(vA).localeCompare(String(vB),undefined,{numeric:true}); return currentOrder==='asc'?c:-c; }); }
            document.querySelector('#profilesTable tbody').innerHTML = profiles.map(p => {
                const vlanReply = replies.find(r => r.groupname === p && r.attribute === 'Tunnel-Private-Group-ID');
                const vlanBadge = vlanReply
                    ? `<span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded border border-blue-200">VLAN ${vlanReply.value}</span>`
                    : `<span class="text-gray-400 text-xs">—</span>`;

                const nasChecks = checks.filter(c => c.groupname === p && c.attribute === 'NAS-IP-Address');
                const nasBadge = nasChecks.length > 0
                    ? `<span class="px-2 py-1 bg-orange-50 text-orange-700 text-xs font-bold rounded border border-orange-200">${nasChecks.length} IP${nasChecks.length > 1 ? 's' : ''}</span>`
                    : `<span class="px-2 py-1 bg-green-50 text-green-700 text-xs font-bold rounded border border-green-200">Any</span>`;

                const skipAttrs = new Set(['Tunnel-Type', 'Tunnel-Medium-Type', 'Tunnel-Private-Group-ID']);
                const replyCount = replies.filter(r => r.groupname === p && !skipAttrs.has(r.attribute)).length;
                const replyBadge = replyCount > 0
                    ? `<span class="px-2 py-1 bg-gray-100 text-gray-600 text-xs font-bold rounded border">${replyCount} attr${replyCount > 1 ? 's' : ''}</span>`
                    : `<span class="text-gray-400 text-xs">—</span>`;

                const userCount = allUsers.filter(u => u.profile === p).length;
                const userBadge = userCount > 0
                    ? `<span class="px-2 py-1 bg-indigo-50 text-indigo-700 text-xs font-bold rounded border border-indigo-200">${userCount} user${userCount !== 1 ? 's' : ''}</span>`
                    : `<span class="text-gray-400 text-xs">0 users</span>`;

                return `
              <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors cursor-pointer" onclick="openDetailPanel('${escapeHtml(p)}')">
                <td class="p-3 font-bold text-blue-700 hover:text-blue-900">${escapeHtml(p)}</td>
                <td class="p-3">${vlanBadge}</td>
                <td class="p-3">${nasBadge}</td>
                <td class="p-3">${replyBadge}</td>
                <td class="p-3">${userBadge}</td>
                <td class="p-3 text-right space-x-2" onclick="event.stopPropagation()">
                  <button onclick="openModal('${escapeHtml(p)}')" class="bg-gray-100 text-gray-700 hover:bg-gray-200 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors shadow-sm">Edit</button>
                  <button onclick="deleteProfile('${escapeHtml(p)}')" class="bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors shadow-sm">Delete</button>
                </td>
              </tr>`;
            }).join('');
        }

        // ─── DETAIL PANEL ─────────────────────────────────────────────────────────

        function openDetailPanel(name) {
            currentDetailProfile = name;
            currentDetailTab = 'overview';
            document.getElementById('pdProfileName').textContent = name;
            document.getElementById('pdAvatar').textContent = name.charAt(0).toUpperCase();
            document.getElementById('pdSubtitle').innerHTML = '<span class="text-xs text-gray-400">Loading...</span>';
            document.getElementById('pdBody').innerHTML = `
            <div class="flex items-center justify-center h-32 text-gray-400 text-sm">
              <svg class="animate-spin mr-2" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
              Loading profile data...
            </div>`;
            document.getElementById('profileDetailOverlay').classList.remove('hidden');
            document.getElementById('profileDetailPanel').classList.remove('translate-x-full');
            setActiveTab('overview');
            loadDetailData(name);
            document.getElementById('pdEditBtn').onclick = () => { closeDetailPanel(); openModal(name); };
            document.getElementById('pdDeleteBtn').onclick = () => { closeDetailPanel(); deleteProfile(name); };
        }

        function closeDetailPanel() {
            document.getElementById('profileDetailPanel').classList.add('translate-x-full');
            document.getElementById('profileDetailOverlay').classList.add('hidden');
            currentDetailProfile = null;
            currentDetailData = null;
        }

        async function refreshDetailPanel() {
            if (!currentDetailProfile) return;
            const icon = document.getElementById('pdRefreshIcon');
            icon.classList.add('spinning');
            await loadDetailData(currentDetailProfile);
            icon.classList.remove('spinning');
        }

        function switchTab(tab) {
            currentDetailTab = tab;
            setActiveTab(tab);
            if (currentDetailData) renderTab(tab, currentDetailData);
        }

        function setActiveTab(active) {
            ['overview', 'users', 'sessions', 'config'].forEach(t => {
                const el = document.getElementById('tab-' + t);
                if (!el) return;
                if (t === active) {
                    el.classList.add('active', 'text-blue-600', 'border-blue-600');
                    el.classList.remove('text-gray-500', 'border-transparent');
                } else {
                    el.classList.remove('active', 'text-blue-600', 'border-blue-600');
                    el.classList.add('text-gray-500', 'border-transparent');
                }
            });
        }

        async function loadDetailData(name) {
            try {
                // Refresh profile data + users + active sessions + auth logs for all assigned users
                const [profileRes, userRes, acctRes] = await Promise.all([
                    apiFetch('/api/profiles/data'),
                    apiFetch('/api/users'),
                    apiFetch('/api/accounting?limit=500')
                ]);

                if (profileRes.ok) allProfileData = await profileRes.json();
                if (userRes.ok) allUsers = await userRes.json();
                const acctData = acctRes.ok ? await acctRes.json() : [];

                const profileUsers = allUsers.filter(u => u.profile === name);
                const usernames = new Set(profileUsers.map(u => u.username));

                // Filter accounting to this profile's users
                const profileSessions = acctData.filter(s => usernames.has(s.username));
                const activeSessions = profileSessions.filter(s => !s.acctstoptime);

                // Fetch auth logs for all assigned users (batch up to 5 for perf)
                let authRows = [];
                const sampleUsers = profileUsers.slice(0, 10);
                const authResults = await Promise.all(
                    sampleUsers.map(u => apiFetch(`/api/authlogs?username=${encodeURIComponent(u.username)}&limit=200`).then(r => r.ok ? r.json() : []))
                );
                authResults.forEach(rows => { authRows = authRows.concat(Array.isArray(rows) ? rows : (rows.rows || [])); });

                const accepts = authRows.filter(r => r.reply === 'Access-Accept').length;
                const rejects = authRows.filter(r => r.reply === 'Access-Reject').length;

                // Aggregate data usage
                const totalDataIn = profileSessions.reduce((n, s) => n + Number(s.acctinputoctets || 0), 0);
                const totalDataOut = profileSessions.reduce((n, s) => n + Number(s.acctoutputoctets || 0), 0);
                const totalTime = profileSessions.reduce((n, s) => n + Number(s.acctsessiontime || 0), 0);

                const pChecks = allProfileData.checks.filter(c => c.groupname === name);
                const pReplies = allProfileData.replies.filter(r => r.groupname === name);

                currentDetailData = { name, profileUsers, activeSessions, profileSessions, accepts, rejects, authRows, totalDataIn, totalDataOut, totalTime, pChecks, pReplies };

                // Subtitle badges
                const vlan = pReplies.find(r => r.attribute === 'Tunnel-Private-Group-ID');
                document.getElementById('pdSubtitle').innerHTML = `
              <span class="px-1.5 py-0.5 bg-indigo-100 text-indigo-700 rounded text-xs font-bold">${profileUsers.length} user${profileUsers.length !== 1 ? 's' : ''}</span>
              ${vlan ? `<span class="px-1.5 py-0.5 bg-blue-100 text-blue-700 rounded text-xs font-bold">VLAN ${vlan.value}</span>` : ''}
              <span class="px-1.5 py-0.5 ${activeSessions.length > 0 ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'} rounded text-xs font-bold">${activeSessions.length} active</span>
            `;

                renderTab(currentDetailTab, currentDetailData);
            } catch (e) {
                document.getElementById('pdBody').innerHTML = `<div class="text-red-500 text-sm p-4">Failed to load profile data: ${e.message}</div>`;
            }
        }

        function renderTab(tab, data) {
            const body = document.getElementById('pdBody');
            if (tab === 'overview') body.innerHTML = renderOverviewTab(data);
            else if (tab === 'users') body.innerHTML = renderUsersTab(data);
            else if (tab === 'sessions') body.innerHTML = renderSessionsTab(data);
            else if (tab === 'config') body.innerHTML = renderConfigTab(data);
        }

        // ── OVERVIEW TAB ──────────────────────────────────────────────────────────
        function renderOverviewTab(data) {
            const { profileUsers, activeSessions, profileSessions, accepts, rejects, totalDataIn, totalDataOut, totalTime, pChecks, pReplies } = data;
            const totalAuths = accepts + rejects;
            const acceptRate = totalAuths > 0 ? Math.round((accepts / totalAuths) * 100) : 0;
            const acceptBarColor = acceptRate >= 80 ? 'bg-green-500' : acceptRate >= 50 ? 'bg-yellow-500' : 'bg-red-500';

            const totpEnabled = profileUsers.filter(u => Number(u.totp_enabled) === 1).length;
            const totpRegistered = profileUsers.filter(u => Number(u.totp_registered) === 1).length;
            const withPlan = profileUsers.filter(u => u.plan_id).length;

            const avgSessionTime = profileSessions.length > 0 ? Math.round(totalTime / profileSessions.length) : 0;
            const nasIps = pChecks.filter(c => c.attribute === 'NAS-IP-Address').map(c => c.value);
            const vlan = pReplies.find(r => r.attribute === 'Tunnel-Private-Group-ID');

            return `
            <!-- KPI Cards -->
            <div class="grid grid-cols-2 gap-3 sm:grid-cols-3 mb-6">
              <div class="stat-card">
                <div class="label">Assigned Users</div>
                <div class="val-big text-indigo-600">${profileUsers.length}</div>
                <div class="val-sub">${withPlan} on a billing plan</div>
              </div>
              <div class="stat-card">
                <div class="label">Active Sessions</div>
                <div class="val-big ${activeSessions.length > 0 ? 'text-green-600' : 'text-gray-400'}">${activeSessions.length}</div>
                <div class="val-sub">${profileSessions.length} total recorded</div>
              </div>
              <div class="stat-card">
                <div class="label">Total Auth Requests</div>
                <div class="val-big">${totalAuths}</div>
                <div class="val-sub">${accepts} accepts · ${rejects} rejects</div>
              </div>
              <div class="stat-card">
                <div class="label">Total Data (In)</div>
                <div class="val-big">${fmtBytes(totalDataIn)}</div>
                <div class="val-sub">Out: ${fmtBytes(totalDataOut)}</div>
              </div>
              <div class="stat-card">
                <div class="label">Total Online Time</div>
                <div class="val-big">${fmtDuration(totalTime)}</div>
                <div class="val-sub">Avg session: ${fmtDuration(avgSessionTime)}</div>
              </div>
              <div class="stat-card">
                <div class="label">TOTP Status</div>
                <div class="val-big">${totpRegistered}<span class="text-sm text-gray-400 font-normal">/${profileUsers.length}</span></div>
                <div class="val-sub">${totpEnabled} enabled · ${totpRegistered} registered</div>
              </div>
            </div>

            <!-- Accept Rate Bar -->
            <div class="mb-6">
              <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Authentication Success Rate (Sampled)</h3>
              <div class="bg-gray-50 border border-gray-100 rounded-xl p-4">
                <div class="flex justify-between items-end mb-2">
                  <span class="text-3xl font-black ${acceptRate >= 80 ? 'text-green-600' : acceptRate >= 50 ? 'text-yellow-600' : 'text-red-600'}">${acceptRate}%</span>
                  <div class="text-right text-xs text-gray-400">
                    <div class="text-green-600 font-bold">${accepts} accepts</div>
                    <div class="text-red-500 font-bold">${rejects} rejects</div>
                  </div>
                </div>
                <div class="progress-bar-track">
                  <div class="progress-bar-fill ${acceptBarColor}" style="width:${acceptRate}%"></div>
                </div>
                ${totalAuths < profileUsers.length * 5 ? '<p class="text-xs text-gray-400 mt-2">&#9432; Based on recently sampled auth logs per user</p>' : ''}
              </div>
            </div>

            <!-- Profile Config Summary -->
            <div class="mb-5">
              <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Profile Configuration</h3>
              <div class="grid grid-cols-2 gap-3">
                <div class="bg-gray-50 border border-gray-100 rounded-xl p-4">
                  <div class="text-xs font-bold text-gray-400 uppercase mb-2">VLAN</div>
                  ${vlan
                    ? `<span class="px-2 py-1 bg-blue-100 text-blue-700 text-sm font-bold rounded border border-blue-200">VLAN ${vlan.value}</span><div class="text-xs text-gray-400 mt-1">Tunnel-Type · IEEE-802 · PVID</div>`
                    : `<span class="text-gray-400 text-sm">No VLAN assigned</span>`}
                </div>
                <div class="bg-gray-50 border border-gray-100 rounded-xl p-4">
                  <div class="text-xs font-bold text-gray-400 uppercase mb-2">NAS Restriction</div>
                  ${nasIps.length > 0
                    ? `<div class="space-y-1">${nasIps.map(ip => `<span class="block px-2 py-0.5 bg-orange-50 text-orange-700 text-xs font-mono rounded border border-orange-200">${ip}</span>`).join('')}</div>`
                    : `<span class="px-2 py-1 bg-green-50 text-green-700 text-xs font-bold rounded border border-green-200">Any NAS Allowed</span>`}
                </div>
              </div>
            </div>

            <!-- Top Users by Data -->
            ${profileUsers.length > 0 ? `
            <div>
              <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Top Users by Data (30 days)</h3>
              <div class="space-y-2">
                ${[...profileUsers].sort((a, b) => (b.data_30d || 0) - (a.data_30d || 0)).slice(0, 5).map(u => {
                        const pct = profileUsers.length > 0 && profileUsers[0].data_30d > 0
                            ? Math.round(((u.data_30d || 0) / Math.max(...profileUsers.map(x => x.data_30d || 0))) * 100) : 0;
                        return `
                    <div class="flex items-center gap-3">
                      <div class="w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 text-xs font-bold flex items-center justify-center flex-shrink-0">${u.username.charAt(0).toUpperCase()}</div>
                      <div class="flex-1 min-w-0">
                        <div class="flex justify-between text-xs mb-1">
                          <span class="font-semibold text-gray-700 truncate">${escapeHtml(u.username)}</span>
                          <span class="text-gray-500 ml-2">${fmtBytes((u.data_30d || 0))}</span>
                        </div>
                        <div class="progress-bar-track">
                          <div class="progress-bar-fill bg-indigo-400" style="width:${pct}%"></div>
                        </div>
                      </div>
                    </div>`;
                    }).join('')}
              </div>
            </div>` : ''}
          `;
        }

        // ── USERS TAB ────────────────────────────────────────────────────────────
        function renderUsersTab(data) {
            const { profileUsers } = data;
            if (!profileUsers.length) return `<div class="text-center text-gray-400 py-16 text-sm">No users assigned to this profile.</div>`;

            return `
            <div class="mb-3 text-xs text-gray-400 font-semibold uppercase tracking-widest">${profileUsers.length} Assigned User${profileUsers.length !== 1 ? 's' : ''}</div>
            <div class="space-y-2">
              ${profileUsers.map(u => `
                <div class="flex items-center gap-3 bg-gray-50 border border-gray-100 rounded-xl p-3 hover:border-indigo-200 transition-colors">
                  <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-700 font-bold text-sm flex items-center justify-center flex-shrink-0">${u.username.charAt(0).toUpperCase()}</div>
                  <div class="flex-1 min-w-0">
                    <div class="font-semibold text-gray-800 text-sm truncate">${escapeHtml(u.username)}</div>
                    <div class="text-xs text-gray-400">${u.plan_name ? `Plan: ${escapeHtml(u.plan_name)}` : 'No plan'}</div>
                  </div>
                  <div class="text-right flex-shrink-0 space-y-1">
                    <div class="text-xs font-mono text-gray-500">${fmtBytes(u.data_30d || 0)} <span class="text-gray-300">30d</span></div>
                    <div class="flex gap-1 justify-end">
                      ${Number(u.totp_enabled) === 1
                    ? `<span class="px-1.5 py-0.5 bg-${Number(u.totp_registered) === 1 ? 'green' : 'amber'}-100 text-${Number(u.totp_registered) === 1 ? 'green' : 'amber'}-700 text-xs rounded font-bold">TOTP ${Number(u.totp_registered) === 1 ? '✓' : '…'}</span>`
                    : ''}
                    </div>
                  </div>
                </div>`).join('')}
            </div>`;
        }

        // ── SESSIONS TAB ─────────────────────────────────────────────────────────
        function renderSessionsTab(data) {
            const { activeSessions, profileSessions } = data;

            const activeHtml = activeSessions.length > 0
                ? activeSessions.map(s => `
              <div class="bg-green-50 border border-green-200 rounded-xl p-3 flex items-start gap-3">
                <span class="mt-0.5 w-2 h-2 rounded-full bg-green-500 animate-pulse flex-shrink-0 mt-2"></span>
                <div class="flex-1 min-w-0">
                  <div class="flex justify-between items-start">
                    <span class="font-bold text-gray-800 text-sm">${escapeHtml(s.username)}</span>
                    <span class="text-xs font-mono text-gray-500">${fmtDuration(s.acctsessiontime)}</span>
                  </div>
                  <div class="text-xs text-gray-500 mt-0.5">${s.framedipaddress || '—'} · NAS: ${s.nasipaddress || '—'}</div>
                  <div class="text-xs text-gray-400 mt-0.5">↑ ${fmtBytes(s.acctinputoctets)} · ↓ ${fmtBytes(s.acctoutputoctets)}</div>
                  <div class="text-xs text-gray-400">Started: ${fmtDate(s.acctstarttime)}</div>
                </div>
              </div>`).join('')
                : `<div class="bg-gray-50 border border-gray-100 rounded-xl p-4 text-center text-gray-400 text-sm">No active sessions</div>`;

            const recentClosed = profileSessions.filter(s => s.acctstoptime).slice(0, 8);

            return `
            <div class="mb-5">
              <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Active Sessions (${activeSessions.length})</h3>
              <div class="space-y-2">${activeHtml}</div>
            </div>
            ${recentClosed.length > 0 ? `
            <div>
              <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Recent Closed Sessions</h3>
              <div class="space-y-2">
                ${recentClosed.map(s => `
                  <div class="bg-gray-50 border border-gray-100 rounded-xl p-3">
                    <div class="flex justify-between items-start">
                      <span class="font-semibold text-gray-700 text-sm">${escapeHtml(s.username)}</span>
                      <span class="text-xs font-mono text-gray-500">${fmtDuration(s.acctsessiontime)}</span>
                    </div>
                    <div class="text-xs text-gray-400 mt-0.5">${fmtDate(s.acctstarttime)} → ${fmtDate(s.acctstoptime)}</div>
                    <div class="text-xs text-gray-400">↑ ${fmtBytes(s.acctinputoctets)} · ↓ ${fmtBytes(s.acctoutputoctets)} · NAS: ${s.nasipaddress || '—'}</div>
                  </div>`).join('')}
              </div>
            </div>` : ''}`;
        }

        // ── CONFIG TAB ────────────────────────────────────────────────────────────
        function renderConfigTab(data) {
            const { pChecks, pReplies, name } = data;
            const skipAttrs = new Set(['Tunnel-Type', 'Tunnel-Medium-Type', 'Tunnel-Private-Group-ID']);
            const nasIps = pChecks.filter(c => c.attribute === 'NAS-IP-Address');
            const vlan = pReplies.find(r => r.attribute === 'Tunnel-Private-Group-ID');
            const customReplies = pReplies.filter(r => !skipAttrs.has(r.attribute));
            const allCheckAttrs = pChecks.filter(c => c.attribute !== 'NAS-IP-Address');

            return `
            <div class="space-y-5">
              <!-- VLAN -->
              <div>
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">VLAN Assignment</h3>
                <div class="bg-gray-50 border border-gray-100 rounded-xl p-4">
                  ${vlan ? `
                    <table class="w-full text-xs font-mono">
                      <tr class="border-b border-gray-100"><td class="py-1.5 text-gray-500 pr-4">Tunnel-Type</td><td class="text-gray-800 font-semibold">VLAN</td></tr>
                      <tr class="border-b border-gray-100"><td class="py-1.5 text-gray-500 pr-4">Tunnel-Medium-Type</td><td class="text-gray-800 font-semibold">IEEE-802</td></tr>
                      <tr><td class="py-1.5 text-gray-500 pr-4">Tunnel-Private-Group-ID</td><td class="text-gray-800 font-semibold">${vlan.value}</td></tr>
                    </table>` : `<span class="text-gray-400 text-sm">No VLAN configured</span>`}
                </div>
              </div>

              <!-- NAS Check Attributes -->
              <div>
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">NAS-IP-Address Checks (${nasIps.length})</h3>
                <div class="bg-gray-50 border border-gray-100 rounded-xl p-4">
                  ${nasIps.length > 0
                    ? `<div class="flex flex-wrap gap-2">${nasIps.map(c => `<span class="px-2 py-1 bg-orange-50 text-orange-700 text-xs font-mono font-bold rounded border border-orange-200">${c.value}</span>`).join('')}</div>`
                    : `<span class="text-gray-400 text-sm">No NAS restriction — any NAS allowed</span>`}
                </div>
              </div>

              <!-- Reply Attributes -->
              <div>
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Reply Attributes (${customReplies.length})</h3>
                <div class="bg-gray-50 border border-gray-100 rounded-xl overflow-hidden">
                  ${customReplies.length > 0 ? `
                    <table class="w-full text-xs">
                      <thead><tr class="bg-gray-100 text-gray-500"><th class="p-2.5 text-left font-semibold">Attribute</th><th class="p-2.5 text-left font-semibold">Op</th><th class="p-2.5 text-left font-semibold">Value</th></tr></thead>
                      <tbody>${customReplies.map((r, i) => `
                        <tr class="${i % 2 === 0 ? '' : 'bg-gray-50'} border-t border-gray-100">
                          <td class="p-2.5 font-mono text-blue-700 font-semibold">${escapeHtml(r.attribute)}</td>
                          <td class="p-2.5 font-mono text-gray-400">${escapeHtml(r.op)}</td>
                          <td class="p-2.5 font-mono text-gray-800">${escapeHtml(r.value)}</td>
                        </tr>`).join('')}</tbody>
                    </table>` : `<div class="p-4 text-gray-400 text-sm">No additional reply attributes</div>`}
                </div>
              </div>

              <!-- Other Check Attributes -->
              ${allCheckAttrs.length > 0 ? `
              <div>
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Other Check Attributes (${allCheckAttrs.length})</h3>
                <div class="bg-gray-50 border border-gray-100 rounded-xl overflow-hidden">
                  <table class="w-full text-xs">
                    <thead><tr class="bg-gray-100 text-gray-500"><th class="p-2.5 text-left font-semibold">Attribute</th><th class="p-2.5 text-left font-semibold">Op</th><th class="p-2.5 text-left font-semibold">Value</th></tr></thead>
                    <tbody>${allCheckAttrs.map((r, i) => `
                      <tr class="${i % 2 === 0 ? '' : 'bg-gray-50'} border-t border-gray-100">
                        <td class="p-2.5 font-mono text-purple-700 font-semibold">${escapeHtml(r.attribute)}</td>
                        <td class="p-2.5 font-mono text-gray-400">${escapeHtml(r.op)}</td>
                        <td class="p-2.5 font-mono text-gray-800">${escapeHtml(r.value)}</td>
                      </tr>`).join('')}</tbody>
                  </table>
                </div>
              </div>` : ''}
            </div>`;
        }

        // ─── MODAL (Create / Edit) ────────────────────────────────────────────────

        function openModal(name = null) {
            document.getElementById('profileModal').classList.remove('hidden');
            document.getElementById('profileForm').reset();
            document.getElementById('replyAttrs').innerHTML = '';
            document.getElementById('nasIpList').innerHTML = '';
            document.getElementById('nasAllowAll').checked = false;
            toggleNasRestriction();

            if (name) {
                document.getElementById('modalTitle').textContent = `Edit Profile: ${name}`;
                document.getElementById('editingName').value = name;
                document.getElementById('profileName').value = name;
                document.getElementById('profileName').readOnly = true;
                document.getElementById('profileName').classList.add('bg-gray-100', 'cursor-not-allowed');
                populateForm(name);
            } else {
                document.getElementById('modalTitle').textContent = 'Create Profile';
                document.getElementById('editingName').value = '';
                document.getElementById('profileName').readOnly = false;
                document.getElementById('profileName').classList.remove('bg-gray-100', 'cursor-not-allowed');
                toggleNasRestriction();
            }
        }

        function closeModal() { document.getElementById('profileModal').classList.add('hidden'); }

        function populateForm(name) {
            const pChecks = allProfileData.checks.filter(c => c.groupname === name);
            const pReplies = allProfileData.replies.filter(r => r.groupname === name);

            const nasChecks = pChecks.filter(c => c.attribute === 'NAS-IP-Address');
            document.getElementById('nasAllowAll').checked = nasChecks.length === 0;
            nasChecks.forEach(c => addNasIpField(c.value));
            toggleNasRestriction();

            const vlanReply = pReplies.find(r => r.attribute === 'Tunnel-Private-Group-ID');
            if (vlanReply) document.getElementById('vlanId').value = vlanReply.value;

            const skipAttrs = new Set(['Tunnel-Type', 'Tunnel-Medium-Type', 'Tunnel-Private-Group-ID']);
            pReplies.filter(r => !skipAttrs.has(r.attribute)).forEach(r => addReplyAttrRow(r.attribute, r.value));
        }

        function toggleNasRestriction() {
            const allowAll = document.getElementById('nasAllowAll').checked;
            document.getElementById('nasIpInputs').classList.toggle('hidden', allowAll);
            if (!allowAll && document.getElementById('nasIpList').children.length === 0) addNasIpField();
        }

        function addNasIpField(value = '') {
            const div = document.createElement('div');
            div.className = 'flex gap-2 items-center';
            div.innerHTML = `
            <input type="text" class="nas-ip-input flex-1 border p-2 rounded-lg bg-gray-50 focus:ring focus:ring-blue-200 outline-none text-sm" placeholder="e.g. 192.168.1.1" value="${escapeHtml(value)}">
            <button type="button" onclick="this.parentElement.remove()" class="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 px-3 py-1.5 rounded-lg text-xs font-bold">Remove</button>`;
            document.getElementById('nasIpList').appendChild(div);
        }

        function addReplyAttr() {
            const k = document.getElementById('newAttrKey').value;
            const v = document.getElementById('newAttrValue').value.trim();
            if (!v) return alert('Please enter a value');
            addReplyAttrRow(k, v);
            document.getElementById('newAttrValue').value = '';
        }

        function addReplyAttrRow(k, v) {
            const div = document.createElement('div');
            div.className = 'flex gap-2 items-center attr-row';
            div.innerHTML = `
            <input type="text" readonly value="${escapeHtml(k)}" class="attr-k flex-1 border p-2 rounded-lg bg-gray-100 text-sm text-gray-600">
            <input type="text" readonly value="${escapeHtml(v)}" class="attr-v flex-1 border p-2 rounded-lg bg-gray-100 text-sm text-gray-600">
            <button type="button" onclick="this.parentElement.remove()" class="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 px-3 py-1.5 rounded-lg text-xs font-bold">Remove</button>`;
            document.getElementById('replyAttrs').appendChild(div);
        }

        document.getElementById('profileForm').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('profileName').value.trim();
            if (!name) return alert('Profile name is required');

            const allowAll = document.getElementById('nasAllowAll').checked;
            const nas_ips = allowAll ? [] : Array.from(document.querySelectorAll('.nas-ip-input')).map(i => i.value.trim()).filter(Boolean);
            const vlan_id = document.getElementById('vlanId').value.trim();
            const reply_attributes = Array.from(document.querySelectorAll('.attr-row')).map(row => ({
                attribute: row.querySelector('.attr-k').value,
                value: row.querySelector('.attr-v').value
            }));

            const res = await apiFetch(`/api/profiles/${encodeURIComponent(name)}`, {
                method: 'POST', body: JSON.stringify({ nas_ips, vlan_id, reply_attributes })
            });
            if (res.ok) { closeModal(); loadProfiles(); }
            else { const err = await res.json(); alert('Error: ' + err.error); }
        };

        async function deleteProfile(name) {
            if (!confirm(`Delete profile "${name}"? Users assigned to this profile will lose it.`)) return;
            const res = await apiFetch(`/api/profiles/${encodeURIComponent(name)}`, { method: 'DELETE' });
            if (res.ok) loadProfiles();
            else { const err = await res.json(); alert('Error: ' + err.error); }
        }

        init();
    </script>

    <style>
        .pd-tab.active {
            color: #2563eb;
            border-bottom-color: #2563eb;
        }

        .stat-card {
            background: #f9fafb;
            border: 1px solid #f0f0f0;
            border-radius: 0.75rem;
            padding: 1rem;
        }

            .stat-card .label {
                font-size: 0.7rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: #9ca3af;
                margin-bottom: 0.25rem;
            }

            .stat-card .val-big {
                font-size: 1.5rem;
                font-weight: 800;
                color: #1f2937;
                line-height: 1.2;
            }

            .stat-card .val-sub {
                font-size: 0.75rem;
                color: #6b7280;
                margin-top: 0.2rem;
            }

        .progress-bar-track {
            background: #e5e7eb;
            border-radius: 9999px;
            height: 8px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 9999px;
            transition: width 0.6s ease;
        }

        #pdRefreshIcon.spinning {
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</body>
</html>
